<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極速單字引擎 - 決戰東京</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;700&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(220, 38, 38, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.1) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 10px);
        }
        
        .cyber-panel { 
            background: linear-gradient(135deg, #121212 0%, #0a0a0a 100%);
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        
        .font-speed { font-family: 'Teko', sans-serif; letter-spacing: 2px; }
        .italic-fast { font-style: italic; font-weight: 900; }
        
        /* 動漫網點效果 (Manga Halftone) 與 圖像記憶 */
        .manga-panel {
            background-color: #fff;
            background-image: radial-gradient(#000 10%, transparent 15%);
            background-size: 4px 4px;
            border: 3px solid #000;
            box-shadow: 4px 4px 0 #06b6d4;
        }

        .manga-image-container {
            background: #fff;
            border: 2px solid #000;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem; 
            filter: contrast(1.2) saturate(1.5);
        }

        /* 賽道動畫 */
        @keyframes dash { to { stroke-dashoffset: 0; } }
        .track-line { stroke-dasharray: 10; animation: dash 0.5s linear infinite; }

        .view-transition { transition: opacity 0.4s ease, transform 0.4s ease; }
        .hidden-view { opacity: 0; transform: scale(0.95) translateY(20px); pointer-events: none; position: absolute; width: 100%; z-index: -1; }
        .active-view { opacity: 1; transform: scale(1) translateY(0); z-index: 10; position: relative; }
    </style>
</head>
<body class="min-h-screen text-zinc-100 pb-12 overflow-x-hidden relative">

    <!-- 頂部導覽與賽季儀表板 -->
    <header class="cyber-panel border-b-2 border-red-600 py-3 px-4 md:px-8 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white rounded-lg flex items-center justify-center transform skew-x-[-10deg] border-2 border-red-600 shadow-[0_0_15px_rgba(220,38,38,0.5)]">
                    <span class="text-2xl font-bold text-red-600 italic-fast skew-x-[10deg]">TYO</span>
                </div>
                <div>
                    <h1 class="text-2xl italic-fast text-white uppercase tracking-wider">
                        決戰東京 <span class="text-cyan-400 text-lg">TOKYO DRIFT</span>
                    </h1>
                    <p class="text-zinc-400 text-xs mt-0.5 tracking-widest" id="real-date-display">載入日期中...</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4 bg-zinc-900 border border-zinc-700 px-4 md:px-6 py-2 rounded transform skew-x-[-10deg]">
                <div class="flex flex-col items-center skew-x-[10deg]">
                    <span class="text-[10px] text-zinc-500 font-bold uppercase">目前站點</span>
                    <span id="current-stage" class="font-speed text-xl text-white">DAY 1</span>
                </div>
                <div class="w-px h-6 bg-zinc-700 skew-x-[10deg]"></div>
                <div class="flex flex-col items-center skew-x-[10deg]">
                    <span class="text-[10px] text-zinc-500 font-bold uppercase">對手狀態</span>
                    <span id="rival-status" class="font-speed text-xl text-red-500">領先中</span>
                </div>
                <div class="w-px h-6 bg-zinc-700 skew-x-[10deg]"></div>
                
                <!-- 新增：切換至總複習第三頁的按鈕 -->
                <button onclick="switchView('review')" class="skew-x-[10deg] bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 text-cyan-400 px-3 py-1 rounded text-xs font-bold transition-all shadow-[0_0_10px_rgba(6,182,212,0.2)]">
                    📖 總複習
                </button>
            </div>
        </div>
    </header>

    <!-- 賽道進度條 (常駐) -->
    <div class="max-w-6xl mx-auto px-4 md:px-8 mt-6 mb-8 relative z-40">
        <div class="cyber-panel rounded-xl p-6 relative overflow-hidden border border-zinc-700">
            <h3 class="text-sm font-bold text-zinc-400 uppercase tracking-widest mb-4">🏆 台北 ➔ 東京 (里程賽)</h3>
            
            <div class="relative h-12 w-full bg-zinc-900 rounded-full border border-zinc-700 flex items-center px-4 overflow-hidden">
                <svg class="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                    <line x1="0" y1="50%" x2="100%" y2="50%" stroke="#333" stroke-width="2" class="track-line"/>
                </svg>
                
                <div id="rival-car" class="absolute transition-all duration-1000 ease-out z-10 flex flex-col items-center" style="left: 30%;">
                    <span id="rival-label" class="text-[10px] bg-red-600 text-white px-1 rounded mb-1">宿敵</span>
                    <div class="text-2xl filter drop-shadow-[0_0_5px_rgba(220,38,38,0.8)]">🏎️</div>
                </div>

                <div id="player-car" class="absolute transition-all duration-1000 ease-out z-20 flex flex-col items-center" style="left: 10%;">
                    <span class="text-[10px] bg-cyan-500 text-white px-1 rounded mb-1">YOU</span>
                    <div class="text-2xl filter drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">🚙</div>
                </div>
                
                <div class="absolute right-4 text-2xl z-10">🇯🇵</div>
            </div>
            <p class="text-xs text-center mt-3 text-zinc-500 font-mono">⚠️ 每 3 天 (共 9 個單字) 將進入【彎道超車測驗】，發音與釋義全對即可勝出！</p>
        </div>
    </div>

    <!-- ================= VIEW 1: 學習主頁 ================= -->
    <main id="view-learning" class="max-w-6xl mx-auto px-4 md:px-8 active-view view-transition">
        
        <div class="flex justify-between items-end mb-4">
            <h2 class="text-2xl italic-fast text-white border-l-4 border-cyan-500 pl-3">今日作戰單字</h2>
            <button onclick="overtakeTomorrow()" id="btn-next-day" class="bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white px-4 py-2 rounded transform skew-x-[-10deg] font-bold text-sm shadow-[0_0_15px_rgba(6,182,212,0.4)] transition-all">
                <span class="inline-block skew-x-[10deg]">⚡ 前往下一天</span>
            </button>
        </div>

        <div id="word-container" class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
            <!-- 單字卡動態生成 -->
        </div>
        
        <div id="exam-trigger-container" class="text-center mt-8 mb-12 hidden">
            <button onclick="switchView('exam')" class="bg-red-600 hover:bg-red-500 text-white text-2xl italic-fast px-12 py-4 rounded-lg transform skew-x-[-10deg] shadow-[0_0_30px_rgba(220,38,38,0.6)] animate-pulse transition-all border-2 border-red-400">
                <span class="inline-block skew-x-[10deg] tracking-widest">🚨 進入超車彎道測驗 (9題全考)</span>
            </button>
        </div>
    </main>

    <!-- ================= VIEW 2: 測驗頁面 ================= -->
    <main id="view-exam" class="max-w-4xl mx-auto px-4 md:px-8 hidden-view view-transition">
        <div class="cyber-panel rounded-2xl p-8 border-2 border-red-600 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-red-600"></div>
            
            <div class="text-center mb-6">
                <h2 class="text-4xl italic-fast text-white mb-2 tracking-widest drop-shadow-[0_0_10px_rgba(220,38,38,0.8)]">彎道超車挑戰</h2>
                <p class="text-cyan-400 font-bold mb-4">必須「唸對發音」且「選對意思」，連續 9 題才能勝出！</p>
                
                <!-- 9題進度條 -->
                <div class="flex justify-center gap-1 flex-wrap max-w-lg mx-auto" id="exam-progress">
                    <!-- JS 動態產生 9 個格子 -->
                </div>
            </div>

            <!-- 測驗題目區 -->
            <div id="quiz-container" class="bg-zinc-900 border border-zinc-700 rounded-xl p-8 mb-6">
                <!-- 動態生成題目 -->
            </div>
            
            <div class="text-center">
                <button onclick="switchView('learning')" class="text-zinc-500 hover:text-white transition-colors text-sm underline">放棄測驗，返回賽道</button>
            </div>
        </div>
    </main>

    <!-- ================= VIEW 3: 總複習單字庫 ================= -->
    <main id="view-review" class="max-w-4xl mx-auto px-4 md:px-8 hidden-view view-transition">
        <div class="cyber-panel rounded-2xl p-6 md:p-8 border-2 border-cyan-500 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-cyan-500"></div>
            
            <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
                <div>
                    <h2 class="text-3xl italic-fast text-white tracking-widest drop-shadow-[0_0_10px_rgba(6,182,212,0.8)]">全賽季單字總覽</h2>
                    <p class="text-zinc-400 text-sm mt-1">目前已解鎖： <span id="review-count" class="text-cyan-400 font-bold font-speed text-xl">0</span> 個單字</p>
                </div>
                <button onclick="switchView('learning')" class="bg-zinc-800 hover:bg-zinc-700 text-white px-4 py-2 rounded-lg border border-zinc-600 transition-all font-bold text-sm">
                    🔙 返回主賽道
                </button>
            </div>

            <!-- 複習單字列表 -->
            <div id="review-list-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
                <!-- JS 動態產生列表 -->
            </div>
        </div>
        
        <style>
            .custom-scrollbar::-webkit-scrollbar { width: 6px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: #18181b; border-radius: 4px; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #06b6d4; }
        </style>
    </main>

    <script>
        // 單字庫：還原圖像記憶 (Emoji) 並保留字根，新增國中會考等級生活化例句
        const wordDatabase = [
            // DAY 1
            { word: "location", pos: "n.", zh: "地點 / 位置", root: "loc (地方) + ation (名詞)", img: "📍", color: "cyan", en_eg: "The new restaurant is in a great location.", zh_eg: "這家新餐廳的地點很棒。" },
            { word: "strategy", pos: "n.", zh: "策略 / 計畫", root: "strat (層次) + egy (名詞)", img: "♟️", color: "red", en_eg: "Studying every day is a good strategy for the test.", zh_eg: "每天讀書是準備考試的好策略。" },
            { word: "practice", pos: "v.", zh: "練習 / 實踐", root: "pract (行動) + ice (名詞)", img: "🎯", color: "green", en_eg: "I practice playing the piano every weekend.", zh_eg: "我每個週末都練習彈鋼琴。" },
            // DAY 2
            { word: "memory", pos: "n.", zh: "記憶", root: "memor (記住) + y (名詞)", img: "🧠", color: "purple", en_eg: "My grandpa has a very good memory.", zh_eg: "我爺爺的記憶力非常好。" },
            { word: "pronounce", pos: "v.", zh: "發音", root: "pro (向前) + nounce (呼喊)", img: "🗣️", color: "yellow", en_eg: "How do you pronounce this English word?", zh_eg: "你怎麼發音這個英文單字？" },
            { word: "environment", pos: "n.", zh: "環境", root: "environ (環繞) + ment (名詞)", img: "🏙️", color: "emerald", en_eg: "We should do our best to protect the environment.", zh_eg: "我們應該盡力保護環境。" },
            // DAY 3
            { word: "destination", pos: "n.", zh: "目的地", root: "de (向下) + stin (站立) + ation", img: "🏁", color: "orange", en_eg: "Taipei is our final destination today.", zh_eg: "台北是我們今天的最終目的地。" },
            { word: "opponent", pos: "n.", zh: "對手", root: "op (反對) + pon (放置) + ent (人)", img: "🦹‍♂️", color: "rose", en_eg: "He is a very strong opponent in the game.", zh_eg: "他在比賽中是個很強的對手。" },
            { word: "victory", pos: "n.", zh: "勝利", root: "vict (征服) + ory (狀態)", img: "🏆", color: "amber", en_eg: "Our team worked hard for this victory.", zh_eg: "我們隊伍為了這次勝利非常努力。" }
        ];

        let currentDayIndex = 0; 
        let rivalProgress = 30; 
        let playerProgress = 10; 

        // 考試系統狀態
        let examQuestions = [];
        let currentExamIndex = 0;
        let isPronunciationPassed = false;
        let isMeaningPassed = false;

        function updateDateDisplay() {
            const dateObj = new Date();
            dateObj.setDate(dateObj.getDate() + currentDayIndex);
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
            const formattedDate = dateObj.toLocaleDateString('zh-TW', options);
            document.getElementById('real-date-display').innerText = `作戰日期：${formattedDate}`;
        }

        function switchView(viewName) {
            const learningView = document.getElementById('view-learning');
            const examView = document.getElementById('view-exam');
            const reviewView = document.getElementById('view-review');
            
            learningView.className = viewName === 'learning' ? 'max-w-6xl mx-auto px-4 md:px-8 active-view view-transition' : 'max-w-6xl mx-auto px-4 md:px-8 hidden-view view-transition';
            examView.className = viewName === 'exam' ? 'max-w-4xl mx-auto px-4 md:px-8 active-view view-transition' : 'max-w-4xl mx-auto px-4 md:px-8 hidden-view view-transition';
            reviewView.className = viewName === 'review' ? 'max-w-4xl mx-auto px-4 md:px-8 active-view view-transition' : 'max-w-4xl mx-auto px-4 md:px-8 hidden-view view-transition';
            
            if (viewName === 'learning') {
                renderWords();
                updateRaceTrack();
            } else if (viewName === 'exam') {
                initExam();
            } else if (viewName === 'review') {
                renderReviewList();
            }
        }

        function updateRaceTrack() {
            document.getElementById('rival-car').style.left = `${rivalProgress}%`;
            document.getElementById('player-car').style.left = `${playerProgress}%`;
            document.getElementById('current-stage').innerText = `DAY ${currentDayIndex + 1}`;
            updateDateDisplay();
            
            const examTrigger = document.getElementById('exam-trigger-container');
            const nextBtn = document.getElementById('btn-next-day');

            // 每 3 天觸發考試
            if ((currentDayIndex + 1) % 3 === 0) {
                examTrigger.classList.remove('hidden');
                nextBtn.classList.add('hidden'); // 考試前不能直接跳下一天
            } else {
                examTrigger.classList.add('hidden');
                nextBtn.classList.remove('hidden');
            }
        }

        function overtakeTomorrow() {
            if ((currentDayIndex + 1) >= wordDatabase.length / 3) {
                alert("已完成所有章節！");
                return;
            }
            currentDayIndex++;
            playerProgress += 10; 
            updateRaceTrack();
            renderWords();
        }

        function speakWord(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        function checkPronunciationLearning(expectedText, buttonElement, color) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("不支援語音辨識。請使用 Chrome。");

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            const originalHtml = buttonElement.innerHTML;
            
            const isSentence = originalHtml.includes('🎤') && !originalHtml.includes('錄音核對單字');
            buttonElement.innerHTML = isSentence ? '⏳' : '🎙️ 聆聽中...';
            buttonElement.classList.add('animate-pulse', `text-${color}-400`);

            recognition.start();
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase().replace(/[.,!?]/g, '').trim();
                const targetText = expectedText.toLowerCase().replace(/[.,!?]/g, '').trim();
                buttonElement.classList.remove('animate-pulse', `text-${color}-400`);
                
                if (transcript === targetText || transcript.includes(targetText) || targetText.includes(transcript)) {
                    buttonElement.innerHTML = isSentence ? '✅' : '✅ 發音精準！';
                    buttonElement.classList.add('bg-green-600', 'text-white');
                } else {
                    buttonElement.innerHTML = isSentence ? '❌' : '❌ 再試一次';
                    alert(`語音核對失敗！\n您唸的是: ${transcript}\n正確應為: ${targetText}`);
                }
                setTimeout(() => { buttonElement.innerHTML = originalHtml; buttonElement.classList.remove('bg-green-600', 'text-white'); }, 3000);
            };
            recognition.onerror = () => {
                buttonElement.classList.remove('animate-pulse');
                buttonElement.innerHTML = isSentence ? '⚠️' : '⚠️ 失敗';
                setTimeout(() => { buttonElement.innerHTML = originalHtml; }, 2000);
            };
        }

        function renderWords() {
            const container = document.getElementById('word-container');
            container.innerHTML = '';

            const startIndex = currentDayIndex * 3;
            const todaysWords = wordDatabase.slice(startIndex, startIndex + 3);

            todaysWords.forEach((item) => {
                const card = document.createElement('div');
                card.className = `cyber-panel p-2 rounded-xl transition-transform hover:-translate-y-2 border-b-4 border-${item.color}-500`;
                const safeSentence = item.en_eg.replace(/'/g, "\\'");

                card.innerHTML = `
                    <div class="bg-zinc-950 h-full rounded-lg p-5 flex flex-col relative overflow-hidden">
                        <div class="manga-panel p-2 mb-4 transform -rotate-1 hover:rotate-0 transition-transform">
                            <div class="manga-image-container h-32 bg-${item.color}-100/10">
                                ${item.img}
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="flex justify-between items-end mb-1">
                                <h2 class="text-4xl italic-fast text-white">${item.word}</h2>
                                <button onclick="speakWord('${item.word}')" class="text-zinc-400 hover:text-white mb-1 text-xl" title="單字發音">🔊</button>
                            </div>
                            <span class="text-[11px] bg-zinc-800 text-zinc-300 px-2 py-1 rounded uppercase tracking-widest">${item.pos} ${item.zh}</span>
                        </div>

                        <button onclick="checkPronunciationLearning('${item.word}', this, '${item.color}')" class="w-full mb-4 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 text-zinc-300 py-2 rounded font-bold transition-all text-sm tracking-wider">
                            🎤 錄音核對單字
                        </button>

                        <div class="bg-zinc-900 border border-zinc-700 p-3 rounded-lg border-l-2 border-l-${item.color}-500 shadow-inner mb-4">
                            <div class="flex justify-between items-start mb-2 border-b border-zinc-800 pb-2">
                                <p class="text-[10px] text-zinc-500 font-bold tracking-widest uppercase">📝 實戰例句</p>
                                <div class="flex gap-3">
                                    <button onclick="checkPronunciationLearning('${safeSentence}', this, '${item.color}')" class="text-zinc-400 hover:text-${item.color}-400 transition-colors text-sm" title="測驗例句">🎤</button>
                                    <button onclick="speakWord('${safeSentence}')" class="text-zinc-400 hover:text-${item.color}-400 transition-colors text-sm" title="朗讀例句">🔊</button>
                                </div>
                            </div>
                            <p class="text-sm font-bold text-zinc-200 mb-1">${item.en_eg}</p>
                            <p class="text-xs text-zinc-500">${item.zh_eg}</p>
                        </div>

                        <div class="mt-auto bg-zinc-900 border border-zinc-700 p-3 rounded-lg border-l-2 border-l-${item.color}-500 shadow-inner">
                            <p class="text-[10px] text-zinc-500 font-bold tracking-widest uppercase mb-1">📖 字根備份路徑</p>
                            <p class="text-sm font-bold text-zinc-200">${item.root}</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            updateRaceTrack();
        }

        // ================= 測驗系統邏輯 =================

        function initExam() {
            const startIndex = currentDayIndex - 2;
            examQuestions = wordDatabase.slice(startIndex * 3, (currentDayIndex + 1) * 3);
            examQuestions = examQuestions.sort(() => 0.5 - Math.random());
            currentExamIndex = 0;
            
            const progressContainer = document.getElementById('exam-progress');
            progressContainer.innerHTML = '';
            for(let i=0; i<9; i++) {
                progressContainer.innerHTML += `<div class="w-8 h-2 bg-zinc-800 rounded transition-colors" id="dot-${i}"></div>`;
            }
            
            loadQuestion();
        }

        function loadQuestion() {
            isPronunciationPassed = false;
            isMeaningPassed = false;

            const container = document.getElementById('quiz-container');
            const q = examQuestions[currentExamIndex];
            
            let options = wordDatabase.filter(w => w.word !== q.word).sort(() => 0.5 - Math.random()).slice(0, 3);
            options.push(q);
            options = options.sort(() => 0.5 - Math.random()); 

            let optionsHtml = options.map((opt, idx) => `
                <button onclick="checkMeaning('${opt.word}', '${q.word}', this)" class="w-full text-left bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 p-4 rounded-lg text-lg font-bold text-zinc-200 transition-colors transform hover:-translate-y-1">
                    ${opt.zh}
                </button>
            `).join('');

            container.innerHTML = `
                <div class="text-center mb-6">
                    <p class="text-zinc-400 text-sm font-bold uppercase tracking-widest mb-2">QUESTION ${currentExamIndex + 1} / 9</p>
                    <h3 class="text-6xl italic-fast text-white tracking-wider mb-4">${q.word}</h3>
                    
                    <div class="flex flex-col md:flex-row justify-center gap-4 mb-6">
                        <div id="task-pronounce" class="bg-zinc-800 p-4 rounded-lg border border-red-500/50 flex-1">
                            <p class="text-sm font-bold text-zinc-400 mb-2">任務 1：正確唸出單字</p>
                            <button id="exam-mic-btn" onclick="checkExamPronunciation('${q.word}')" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-2 rounded shadow-[0_0_10px_rgba(220,38,38,0.5)] transition-all">
                                🎙️ 點擊錄音
                            </button>
                        </div>
                        
                        <div id="task-meaning" class="bg-zinc-800 p-4 rounded-lg border border-cyan-500/50 flex-1">
                            <p class="text-sm font-bold text-zinc-400 mb-2">任務 2：選擇正確釋義</p>
                            <div class="text-sm text-cyan-400 font-bold" id="meaning-status">請在下方選擇...</div>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="options-grid">
                    ${optionsHtml}
                </div>
            `;
        }

        function checkExamPronunciation(expectedText) {
            if (isPronunciationPassed) return;
            const btn = document.getElementById('exam-mic-btn');
            const taskBox = document.getElementById('task-pronounce');
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("不支援語音辨識。請使用 Chrome。");

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            btn.innerHTML = '聆聽中...';
            btn.classList.add('animate-pulse');

            recognition.start();
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase().replace(/[.,!?]/g, '').trim();
                const targetText = expectedText.toLowerCase().replace(/[.,!?]/g, '').trim();
                btn.classList.remove('animate-pulse');
                
                if (transcript === targetText || transcript.includes(targetText) || targetText.includes(transcript)) {
                    isPronunciationPassed = true;
                    btn.innerHTML = '✅ 發音過關';
                    btn.className = 'w-full bg-green-600 text-white font-bold py-2 rounded shadow-[0_0_10px_rgba(34,197,94,0.5)]';
                    taskBox.className = 'bg-zinc-800 p-4 rounded-lg border border-green-500 flex-1';
                    checkIfBothPassed();
                } else {
                    btn.innerHTML = '❌ 重試錄音';
                }
            };
            recognition.onerror = () => {
                btn.classList.remove('animate-pulse');
                btn.innerHTML = '⚠️ 點擊重試';
            };
        }

        function checkMeaning(selectedWord, correctWord, btnElement) {
            if (isMeaningPassed) return;
            
            if (selectedWord === correctWord) {
                isMeaningPassed = true;
                btnElement.classList.replace('bg-zinc-800', 'bg-green-600');
                btnElement.classList.replace('border-zinc-600', 'border-green-500');
                
                const status = document.getElementById('meaning-status');
                status.innerText = '✅ 釋義過關';
                status.className = 'text-green-400 font-bold';
                document.getElementById('task-meaning').className = 'bg-zinc-800 p-4 rounded-lg border border-green-500 flex-1';
                
                checkIfBothPassed();
            } else {
                alert("❌ 釋義錯誤！彎道失誤，請重新挑戰本單元！");
                switchView('learning');
            }
        }

        function checkIfBothPassed() {
            if (isPronunciationPassed && isMeaningPassed) {
                document.getElementById(`dot-${currentExamIndex}`).classList.replace('bg-zinc-800', 'bg-green-500');
                
                setTimeout(() => {
                    currentExamIndex++;
                    if (currentExamIndex >= 9) {
                        examVictory();
                    } else {
                        loadQuestion();
                    }
                }, 800); 
            }
        }

        function examVictory() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = `
                <div class="text-center py-8">
                    <div class="text-7xl mb-4">🏁</div>
                    <h3 class="text-4xl italic-fast text-cyan-400 mb-2 drop-shadow-[0_0_15px_rgba(6,182,212,0.8)]">完美飄移！全數過關！</h3>
                    <p class="text-zinc-300 mb-6">9 個單字的發音與釋義全數通關！正式超越對手！</p>
                    <button onclick="claimVictory()" class="bg-cyan-600 text-white px-8 py-3 rounded-lg font-bold italic-fast text-xl shadow-[0_0_20px_rgba(6,182,212,0.5)] hover:bg-cyan-500 transition-all transform hover:scale-105">
                        領取氮氣加速並前往下一天
                    </button>
                </div>
            `;
        }

        function claimVictory() {
            playerProgress += 30; 
            if (playerProgress >= 90) playerProgress = 90; 
            rivalProgress = playerProgress - 15; 
            
            document.getElementById('rival-label').innerText = '落後';
            document.getElementById('rival-label').className = 'text-[10px] bg-zinc-600 text-white px-1 rounded mb-1';
            document.getElementById('rival-status').innerText = '落後中';
            document.getElementById('rival-status').className = 'font-speed text-xl text-zinc-500';
            
            alert("🏎️💨 N2O 氮氣啟動！");
            
            currentDayIndex++; 
            switchView('learning');
            document.getElementById('btn-next-day').classList.remove('hidden');
        }

        // ================= VIEW 3: 總複習單字庫邏輯 =================
        function renderReviewList() {
            const container = document.getElementById('review-list-container');
            container.innerHTML = '';
            
            // 擷取目前為止所有解鎖（學過）的單字
            const unlockedWords = wordDatabase.slice(0, (currentDayIndex + 1) * 3);
            document.getElementById('review-count').innerText = unlockedWords.length;

            unlockedWords.forEach((item) => {
                container.innerHTML += `
                    <div class="bg-zinc-900 border border-zinc-700 p-4 rounded-lg flex justify-between items-center border-l-4 border-l-${item.color}-500 mb-2 hover:bg-zinc-800 transition-colors shadow-sm">
                        <div class="flex flex-col">
                            <div class="flex items-center gap-2 mb-1">
                                <h4 class="text-2xl italic-fast text-white w-28 md:w-32">${item.word}</h4>
                                <span class="text-[10px] bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded uppercase">${item.pos}</span>
                            </div>
                            <span class="text-sm font-bold text-zinc-300">${item.zh}</span>
                        </div>
                        <button onclick="speakWord('${item.word}')" class="text-2xl text-zinc-500 hover:text-${item.color}-400 transition-colors p-2" title="聆聽發音">🔊</button>
                    </div>
                `;
            });
        }

        window.addEventListener('load', () => {
            renderWords();
        });
    </script>
</body>
</html>
